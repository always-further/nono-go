name: Upstream compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read

jobs:
  test-upstream:
    name: nono HEAD (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin_arm64
            cargo-target: aarch64-apple-darwin
          - os: macos-15-intel
            platform: darwin_amd64
            cargo-target: x86_64-apple-darwin
          - os: ubuntu-24.04
            platform: linux_amd64
            cargo-target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux_arm64
            cargo-target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.cargo-target }}

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Clone nono HEAD
        id: nono-rev
        run: |
          git clone --depth=1 https://github.com/always-further/nono.git /tmp/nono-src
          sha="$(git -C /tmp/nono-src rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Build nono-ffi
        env:
          CARGO_TARGET: ${{ matrix.cargo-target }}
          PLATFORM: ${{ matrix.platform }}
          NONO_SHA: ${{ steps.nono-rev.outputs.sha }}
        run: |
          cargo build --release \
            --manifest-path /tmp/nono-src/Cargo.toml \
            -p nono-ffi \
            --target "$CARGO_TARGET"
          cp "/tmp/nono-src/target/$CARGO_TARGET/release/libnono_ffi.a" \
            "internal/clib/$PLATFORM/libnono_ffi.a"
          cp /tmp/nono-src/bindings/c/include/nono.h internal/clib/nono.h
          {
            echo "# nono upstream commit used to build libnono_ffi.a for $CARGO_TARGET"
            echo "# Update this file whenever the bundled library is rebuilt."
            echo "$NONO_SHA"
          } > "internal/clib/$PLATFORM/VERSION"

      - name: go vet
        run: go vet ./...

      - name: go test
        env:
          NONO_REQUIRE_APPLY: "1"
        run: go test -v -count=1 ./...

      - name: go test race
        env:
          NONO_SKIP_APPLY_SANDBOX_TEST: "1"
        run: go test -race -v -count=1 ./...
