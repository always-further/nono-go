name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hygiene:
    name: hygiene
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: go mod tidy
        run: go mod tidy -diff

      - name: go mod verify
        run: go mod verify

  test:
    name: test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin_arm64
          - os: macos-15-intel
            platform: darwin_amd64
          - os: ubuntu-24.04
            platform: linux_amd64
          - os: ubuntu-24.04-arm
            platform: linux_arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'
          cache: true

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: go vet
        run: go vet ./...

      - name: go test
        env:
          NONO_REQUIRE_APPLY: "1"
        run: go test -v -count=1 ./...

      - name: go test coverage
        env:
          NONO_SKIP_APPLY_SANDBOX_TEST: "1"
        run: go test -v -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: coverage summary
        run: |
          go tool cover -func=coverage.out > coverage.txt
          cat coverage.txt
          {
            echo "### Coverage (${{ matrix.platform }})"
            echo
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: go test race
        env:
          NONO_SKIP_APPLY_SANDBOX_TEST: "1"
        run: go test -race -v -count=1 ./...

  lint:
    name: lint (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin_arm64
          - os: macos-15-intel
            platform: darwin_amd64
          - os: ubuntu-24.04
            platform: linux_amd64
          - os: ubuntu-24.04-arm
            platform: linux_arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'
          cache: true

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1

      - name: staticcheck
        run: staticcheck ./...
